<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyan Shala</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        .custom-navbar {
            background: #ffffff !important;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            padding: 0.75rem 1rem;
        }

        .navbar-brand {
            font-weight: 700;
            color: #2d3436 !important;
            letter-spacing: -0.5px;
        }

        .navbar-nav .nav-link {
            font-size: 0.9rem;
            font-weight: 500;
            color: #636e72 !important;
            padding: 0.5rem 1rem !important;
            position: relative;
            transition: color 0.3s ease;
        }

        .navbar-nav .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 50%;
            background-color: #0d6efd;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .navbar-nav .nav-link:hover::after,
        .navbar-nav .nav-link.active::after {
            width: 70%;
        }

        .navbar-nav .nav-link:hover {
            color: #0d6efd !important;
        }

        /* Fixed Search Bar Styling */
        .search-container {
            background-color: #f1f3f5;
            border-radius: 50px;
            padding: 2px 12px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            /* Width set just long enough for "Search..." */
            width: 130px;
        }

        .search-input {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 4px 5px !important;
            font-size: 0.85rem;
            width: 100%;
        }

        .search-container:focus-within {
            background-color: #fff;
            border-color: #0d6efd;
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1);
            width: 160px;
            /* Slight expansion for focus */
        }

        .dropdown-menu {
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            padding: 10px;
        }

        .dropdown-toggle::after {
            display: none !important;
        }

        .dropdown-toggle::before {
            content: "\F282";
            font-family: "bootstrap-icons";
            font-size: 0.7rem;
            margin-right: 5px;
            vertical-align: middle;
            opacity: 0.5;
        }

        @media (max-width: 991px) {
            .search-container {
                margin-top: 15px;
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg custom-navbar sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="https://media.licdn.com/dms/image/v2/C4E0BAQG25LZAHqT6iA/company-logo_200_200/company-logo_200_200/0/1631313914309?e=2147483647&v=beta&t=1NbYXM-JtvLPJQu6PG76sYmqykQlfATeCAwqxvccTlU"
                    alt="Logo" width="32" height="32" class="me-2 rounded-circle">
                Gyan Shala
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="bi bi-list fs-2"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">About
                            Us</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Our Mission</a></li>
                            <li><a class="dropdown-item" href="#">Our Team</a></li>
                        </ul>
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button"
                            data-bs-toggle="dropdown">Programs</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Primary Education</a></li>
                            <li><a class="dropdown-item" href="#">Secondary Education</a></li>
                        </ul>
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button"
                            data-bs-toggle="dropdown">Curriculum</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Primary Education</a></li>
                            <li><a class="dropdown-item" href="#">Secondary Education</a></li>
                        </ul>
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Reports</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Annual Report</a></li>
                            <li><a class="dropdown-item" href="#">Financials</a></li>
                        </ul>
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Get
                            Involved</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Volunteer</a></li>
                            <li><a class="dropdown-item" href="#">Donate</a></li>
                        </ul>
                    </li>
                </ul>

                <form class="d-flex" role="search">
                    <div class="search-container">
                        <i class="bi bi-search text-muted small"></i>
                        <input class="form-control search-input" type="search" placeholder="Search..."
                            aria-label="Search">
                    </div>
                </form>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
