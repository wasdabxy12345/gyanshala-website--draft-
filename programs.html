<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programs</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div id="header-load"></div>

    <main class="container-fluid px-3 px-md-5">
        <section id="programs-hero" class="text-white py-5 mb-5">
            <div class="container py-5 text-center">
                <h1 class="display-4 fw-bold mb-3">Our Programs</h1>
                <p class="lead opacity-75 mx-auto" style="max-width: 700px;">
                    Driving change and creating impact across the nation through education and community engagement.
                </p>
            </div>

            <div class="row row-cols-2 row-cols-lg-5 g-4 text-center py-5 bg-light rounded-4 shadow-sm">
                <div class="col">
                    <div class="h2 fw-bold text-primary mb-1">10+</div>
                    <div class="text-secondary small text-uppercase fw-bold">Years</div>
                </div>
                <div class="col">
                    <div class="h2 fw-bold text-primary mb-1">50,000+</div>
                    <div class="text-secondary small text-uppercase fw-bold">Students</div>
                </div>
                <div class="col">
                    <div class="h2 fw-bold text-primary mb-1">25+</div>
                    <div class="text-secondary small text-uppercase fw-bold">States</div>
                </div>
                <div class="col">
                    <div class="h2 fw-bold text-primary mb-1">500+</div>
                    <div class="text-secondary small text-uppercase fw-bold">Schools</div>
                </div>
                <div class="col">
                    <div class="h2 fw-bold text-primary mb-1">100+</div>
                    <div class="text-secondary small text-uppercase fw-bold">Partners</div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div id="footer-load"></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
